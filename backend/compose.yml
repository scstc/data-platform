services:
  postgres:
    image: postgres:16-alpine
    container_name: adp-postgres
    environment:
      POSTGRES_USER: adp
      POSTGRES_PASSWORD: adp_dev_pw
      POSTGRES_DB: adp
    ports:
      - "55433:5432"
    volumes:
      - adp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adp -d adp"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  adp_pg_data:
