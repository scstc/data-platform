name: deploy-pages

# dashboard/ 静态产物变更时自动发布到 GitHub Pages
on:
  push:
    branches: [dev]
    paths: ['dashboard/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 提前切换 Node 24(2026-06-16 起官方默认),消除 Node 20 弃用警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
