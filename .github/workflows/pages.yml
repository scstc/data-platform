name: deploy-pages

# dashboard/ 静态产物变更时自动发布到 GitHub Pages
on:
  push:
    branches: [dev]
    paths: ['dashboard/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # 以下版本均原生 node24,无需 FORCE_JAVASCRIPT_ACTIONS_TO_NODE24
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v5
